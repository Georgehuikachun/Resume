name: 投资组合监控

on:
  schedule:
    # 每个澳洲交易日早上发报。22:30 UTC = 悉尼 08:30(冬令时AEST)/ 09:30(夏令时AEDT)
    # 周日~周四 UTC 对应周一~周五悉尼早晨,正好在 ASX 10:00 开盘前,可据隔夜美股决定当天动作
    - cron: '30 22 * * 0-4'
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r INVESTMENT_ASSISTANT/requirements.txt

      - name: 运行信号引擎
        run: python INVESTMENT_ASSISTANT/assistant.py

      - name: AI 投资经理点评(可选,需配置 ANTHROPIC_API_KEY secret)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            python INVESTMENT_ASSISTANT/ai_advisor.py
          else
            echo "未配置 ANTHROPIC_API_KEY,跳过 AI 点评(核心功能不受影响)。"
          fi
        continue-on-error: true

      - name: 创建每日仓位报告 Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const alerts = JSON.parse(fs.readFileSync('INVESTMENT_ASSISTANT/alerts.json', 'utf8'));
            const report = fs.readFileSync('INVESTMENT_ASSISTANT/report.md', 'utf8');
            const date = new Date().toISOString().slice(0, 10);
            const actionCount = alerts.action_count || 0;
            let title;
            if (alerts.has_urgent) {
              title = `🟥 ${date} 紧急操作提醒(${actionCount} 条需执行)`;
            } else if (actionCount > 0) {
              title = `📋 ${date} 有 ${actionCount} 条建议操作`;
            } else if (alerts.alert_count > 0) {
              title = `💡 ${date} 今日情况(仅供参考,无需操作)`;
            } else {
              title = `✅ ${date} 一切正常,继续持有`;
            }
            // 同一天不重复创建(手动触发时防止重复)
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'investment-alert',
              state: 'open',
              per_page: 50,
            });
            if (existing.data.some(i => i.title.includes(date))) {
              core.info('今日通知已存在,跳过。');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: report,
              labels: ['investment-alert'],
            });
