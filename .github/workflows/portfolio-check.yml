name: 投资组合监控

on:
  schedule:
    # 每周三 03:00 UTC = 悉尼/墨尔本 13:00(冬令时)/ 14:00(夏令时)
    - cron: '0 3 * * 3'
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r INVESTMENT_ASSISTANT/requirements.txt

      - name: 运行信号引擎
        run: python INVESTMENT_ASSISTANT/assistant.py

      - name: AI 投资经理点评(可选,需配置 ANTHROPIC_API_KEY secret)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            python INVESTMENT_ASSISTANT/ai_advisor.py
          else
            echo "未配置 ANTHROPIC_API_KEY,跳过 AI 点评(核心功能不受影响)。"
          fi
        continue-on-error: true

      - name: 创建每周仓位指令 Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const alerts = JSON.parse(fs.readFileSync('INVESTMENT_ASSISTANT/alerts.json', 'utf8'));
            const report = fs.readFileSync('INVESTMENT_ASSISTANT/report.md', 'utf8');
            const date = new Date().toISOString().slice(0, 10);
            let title;
            if (alerts.has_urgent) {
              title = `🟥 本周仓位指令 ${date}:有紧急操作(${alerts.alert_count} 条)`;
            } else if (alerts.alert_count > 0) {
              title = `📋 本周仓位指令 ${date}:${alerts.alert_count} 条待执行`;
            } else {
              title = `✅ 本周报告 ${date}:无需调整,继续持有`;
            }
            // 同一天不重复创建(手动触发时防止重复)
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'investment-alert',
              state: 'open',
              per_page: 50,
            });
            if (existing.data.some(i => i.title.includes(date))) {
              core.info('今日通知已存在,跳过。');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: report,
              labels: ['investment-alert'],
            });
