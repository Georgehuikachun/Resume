name: 投资组合监控

on:
  schedule:
    # UTC 时间,对应美东盘前(9:30前)、午盘、收盘后各检查一次(工作日)
    - cron: '0 13 * * 1-5'
    - cron: '0 17 * * 1-5'
    - cron: '30 21 * * 1-5'
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r INVESTMENT_ASSISTANT/requirements.txt

      - name: 运行信号引擎
        run: python INVESTMENT_ASSISTANT/assistant.py

      - name: AI 投资经理点评(可选,需配置 ANTHROPIC_API_KEY secret)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            python INVESTMENT_ASSISTANT/ai_advisor.py
          else
            echo "未配置 ANTHROPIC_API_KEY,跳过 AI 点评(核心功能不受影响)。"
          fi
        continue-on-error: true

      - name: 有信号时创建 Issue 推送通知
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const alerts = JSON.parse(fs.readFileSync('INVESTMENT_ASSISTANT/alerts.json', 'utf8'));
            if (alerts.alert_count === 0) {
              core.info('今日无信号,不创建通知。');
              return;
            }
            const report = fs.readFileSync('INVESTMENT_ASSISTANT/report.md', 'utf8');
            const date = new Date().toISOString().slice(0, 10);
            const prefix = alerts.has_urgent ? '🟥 紧急' : '🔔';
            const title = `${prefix} 投资信号 ${date}(${alerts.alert_count} 条)`;
            // 同一天已发过相同级别的通知就不重复创建(每天最多运行3次)
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'investment-alert',
              state: 'open',
              per_page: 50,
            });
            if (existing.data.some(i => i.title.startsWith(`${prefix} 投资信号 ${date}`))) {
              core.info('今日同级别通知已存在,跳过。');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: report,
              labels: ['investment-alert'],
            });
